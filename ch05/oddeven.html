<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홀수/짝수</title>
</head>
<body>
    <input id="input-number" type="number"/>
    <button id="btn" typ="button">확인</button>
    <div id="print"></div>
</body>
</html>
<script>
    // 1. 버튼 요소 가져온 후 클릭 이벤트 등록
    document.getElementById("btn").onclick=function() {
        // 2. input 내 walue 조회
        let num=document.getElementById("input-number").value;
        alert(num);

        let result = null;
        // 3. num 짝수인지 홀수인지 판별
        if (num % 2 ==0){
            //짝수
            result="짝수";
        }else{
            //홀수
            result = "홀수";
        }
        document.getElementById("print").textContent=result;
    };
</script>
