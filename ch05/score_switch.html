<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>점수</title>
</head>
<body>
    <input id="input-number" type="number"/>
    <button id="btn" typ="button">확인</button>
    <div id="print"></div>
</body>
</html>
<script>
    document.getElementById("btn").onclick=function() {
        let score=document.getElementById("input-number").value;

        let result = null;
        switch (true) {
            case (score>100 || score<0):
                result='올바른 점수(0~100)를 입력하세요.';
                break;
            case (score >= 90):
                result="A";
                break;
            case (score >= 80):
                result="B";
                break;
            case (score >= 70):
                result="C";
                break;
            case (score >= 60):
                result="D";
                break;
            default:
                result="F"
                break;
        }
        document.getElementById("print").textContent=result;
    };
</script>
